services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./DBMSbackend-main
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/dbms_project
      JWT_SECRET: change_this_secret
      CORS_ORIGIN: http://localhost:5500
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./DBMSfrontend_main
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5500:5500"

volumes:
  mongo_data:
